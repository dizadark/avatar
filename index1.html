<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ававтар</title>
    <link rel="stylesheet" href="./css/index2.css">
</head>
<body>

    <div class="form-wrapper">
        <form class="form">
            <label for="username" class="form__label">
                <span class="form__label-text">Ім'я</span>
                <input required placeholder="name" type="text" id="username" name="username" class="form__input">
            </label>

            <label for="password" class="form__label">
                <span class="form__label-text">Пароль</span>
                <input required placeholder="password" type="password" id="password" name="password" class="form__input">
            </label>

            <label for="email" class="form__label">
                <span class="form__label-text">Пошта</span>
                <input required placeholder="email" type="email" id="email" name="email" class="form__input">
            </label>

            <div>
                <button type="submit" class="form__button">Відправити</button>
            </div>
        </form>
    </div>

</body>
</html>
